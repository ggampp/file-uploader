<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Downloader</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="header-row">
        <h1>Multi Downloader</h1>
        <span id="version-badge" class="version-badge" aria-label="Versão do app">v…</span>
      </div>
      <p class="subtitle">
        Cole um link de <strong>Instagram</strong>, <strong>X.com</strong> ou
        <strong>YouTube</strong> e baixe o vídeo em MP4. Uso pessoal.
      </p>
    </header>

    <form id="reel-form" autocomplete="off">
      <div class="input-row">
        <input
          type="url"
          id="reel-url"
          name="url"
          placeholder="https://www.instagram.com/reel/... | https://x.com/.../status/... | https://youtu.be/..."
          required
        >
        <button type="button" id="clear-btn" class="icon-btn" title="Limpar campo" aria-label="Limpar campo">✕</button>
      </div>
      <div class="actions-row">
        <button type="button" id="paste-btn" class="secondary-btn">Colar do clipboard</button>
        <button type="submit" id="submit-btn" class="primary-btn">Buscar</button>
      </div>
    </form>

    <div id="status" role="status" aria-live="polite"></div>

    <section id="log-panel" hidden>
      <div class="log-header">
        <span>Log de execução</span>
        <div class="log-actions">
          <button type="button" id="log-copy" class="link-btn">copiar</button>
          <button type="button" id="log-clear" class="link-btn">limpar</button>
        </div>
      </div>
      <pre id="log" aria-live="polite"></pre>
    </section>

    <section id="result" hidden>
      <video id="preview" controls playsinline preload="metadata"></video>
      <p id="caption"></p>
      <a id="download-link" class="download-btn" download>
        Baixar vídeo (.mp4)
      </a>
    </section>
  </main>

  <footer>
    <small>Uso pessoal. Respeite os direitos do criador do conteúdo.</small>
  </footer>

  <script src="/javascripts/main.js"></script>
</body>
</html>
