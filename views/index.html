<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels Downloader</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header>
      <div class="header-row">
        <h1>Reels Downloader</h1>
        <span id="version-badge" class="version-badge" aria-label="Versão do app">v…</span>
      </div>
      <p class="subtitle">Cole o link de um Reels público do Instagram e baixe o vídeo em MP4.</p>
    </header>

    <form id="reel-form" autocomplete="off">
      <div class="input-row">
        <input
          type="url"
          id="reel-url"
          name="url"
          placeholder="https://www.instagram.com/reel/..."
          required
        >
        <button type="button" id="clear-btn" class="icon-btn" title="Limpar campo" aria-label="Limpar campo">✕</button>
      </div>
      <div class="actions-row">
        <button type="button" id="paste-btn" class="secondary-btn">Colar do clipboard</button>
        <button type="submit" id="submit-btn" class="primary-btn">Buscar</button>
      </div>
    </form>

    <div id="status" role="status" aria-live="polite"></div>

    <section id="result" hidden>
      <video id="preview" controls playsinline preload="metadata"></video>
      <p id="caption"></p>
      <a id="download-link" class="download-btn" download>
        Baixar Reel (.mp4)
      </a>
    </section>
  </main>

  <footer>
    <small>Use apenas para conteúdo público e respeite os direitos do criador.</small>
  </footer>

  <script src="/javascripts/main.js"></script>
</body>
</html>
